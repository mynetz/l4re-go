# Build orchestration for in-tree Go applications targeting L4Re via tamago.
#
# apps/<name>/ is a self-contained Go module pinning
# github.com/usbarmory/tamago via a replace directive at ../../third_party/tamago.
# Build output: output/build/apps/<name>/<arch>/<binary>.

version: '3'

vars:
  APPS_OUT: '{{.REPO_ROOT}}/output/build/apps'

tasks:
  hello:build:
    desc: Build apps/hello with GOOS=tamago using the user/l4re overlay
    deps: [':tamago:bin']
    sources:
      - '{{.REPO_ROOT}}/apps/hello/main.go'
      - '{{.REPO_ROOT}}/apps/hello/go.mod'
      - '{{.REPO_ROOT}}/third_party/tamago/user/l4re/**/*'
    generates:
      - '{{.APPS_OUT}}/hello/x86_64/hello-go'
    cmds:
      - mkdir -p '{{.APPS_OUT}}/hello/x86_64'
      - |
        cd '{{.REPO_ROOT}}/apps/hello' && \
          GOOS=tamago GOARCH=amd64 \
          GOOSPKG=github.com/usbarmory/tamago \
          '{{.REPO_ROOT}}/tools/tamago-bin' build \
            -tags linkcpuinit,linkramstart,linkramsize,linkprintk \
            -ldflags "-E cpuinit -T 0x10010000 -R 0x1000" \
            -o '{{.APPS_OUT}}/hello/x86_64/hello-go' .

  hello:qemu:
    desc: 'Boot the hello-go-cfg scenario in QEMU (WIP: faults in runtime.settls; see apps/hello/README.md)'
    deps: [hello:build, ':fiasco:build', ':l4re:build']
    interactive: true
    cmds:
      - |
        cat <<'EOF'
        # ------------------------------------------------------------------
        # Iteration 2b WIP: this scenario currently faults inside
        # runtime.settls (tamago-go assumes Linux's arch_prctl(SET_FS) ABI;
        # Fiasco does not serve it). The fix lives in tamago-go itself and
        # is tracked as iteration 2c in docs/roadmap.md.
        #
        # The expected output today: bootstrap -> Fiasco -> sigma0 -> moe ->
        # ned loads hello-go, cpuinit runs, then a 'l4re_itas: FATAL'
        # report from runtime.settls at rip ~0x10080622 with fs_base = 0.
        # See apps/hello/README.md for the full explanation.
        # ------------------------------------------------------------------
        EOF
      - |
        make -C '{{.L4RE_OBJDIR}}' \
          E=hello-go-cfg qemu \
          MODULES_LIST='{{.REPO_ROOT}}/apps/hello/l4re-pkg/modules.list' \
          MODULE_SEARCH_PATH='{{.REPO_ROOT}}/apps/hello/l4re-pkg:{{.APPS_OUT}}/hello/x86_64:{{.KERNEL_OBJDIR}}:{{.L4RE_SRCDIR}}/conf/examples'

  hello:clean:
    desc: Remove apps/hello build outputs
    cmds:
      - rm -rf '{{.APPS_OUT}}/hello'

  clean:
    desc: Remove all app build outputs
    cmds:
      - rm -rf '{{.APPS_OUT}}'
